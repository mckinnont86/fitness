<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="McLifts 2026">
<title>McLifts — 2026</title>
<style>
  :root {
    --bg: #0A0A0A;
    --bg2: #111111;
    --bg3: #1A1A1A;
    --bg4: #222222;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #F0F0F0;
    --text2: #999;
    --text3: #666;
    --green: #1DB87A;
    --green-bg: rgba(29,184,122,0.12);
    --green-dark: #0D6B47;
    --blue: #3B8BDB;
    --blue-bg: rgba(59,139,219,0.12);
    --orange: #E06030;
    --orange-bg: rgba(224,96,48,0.12);
    --purple: #8B7FDD;
    --purple-bg: rgba(139,127,221,0.12);
    --amber: #CC8010;
    --amber-bg: rgba(204,128,16,0.12);
    --red: #E04040;
    --red-bg: rgba(224,64,64,0.10);
    --radius: 10px;
    --radius-lg: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { background: var(--bg); color: var(--text); font-family: -apple-system, 'SF Pro Text', sans-serif; font-size: 14px; min-height: 100vh; }

  /* HEADER */
  .app-header { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 16px 16px 12px; position: sticky; top: 0; z-index: 100; }
  .app-title { font-size: 20px; font-weight: 700; letter-spacing: -0.5px; }
  .app-title span { }
  .app-subtitle { font-size: 12px; color: var(--text3); margin-top: 2px; }

  /* MAIN NAV */
  .main-nav { display: flex; gap: 6px; padding: 10px 16px; background: var(--bg2); border-bottom: 1px solid var(--border); overflow-x: auto; scrollbar-width: none; }
  .main-nav::-webkit-scrollbar { display: none; }
  .main-nav button { flex-shrink: 0; padding: 7px 14px; border-radius: 20px; border: 1px solid var(--border2); background: transparent; color: var(--text2); font-size: 12px; font-weight: 500; cursor: pointer; transition: all .15s; white-space: nowrap; }
  .main-nav button.active { background: var(--green); color: #000; border-color: var(--green); font-weight: 600; }

  /* SECTIONS */
  .section { display: none; padding: 12px 16px 100px; }
  .section.active { display: block; }

  /* PHASE NAV */
  .phase-scroll { display: flex; gap: 6px; overflow-x: auto; scrollbar-width: none; margin-bottom: 12px; padding-bottom: 2px; }
  .phase-scroll::-webkit-scrollbar { display: none; }
  .phase-btn { flex-shrink: 0; padding: 6px 12px; border-radius: 8px; border: 1px solid var(--border2); background: var(--bg3); color: var(--text2); font-size: 11px; font-weight: 500; cursor: pointer; }
  .phase-btn.active { background: var(--green-bg); color: var(--green); border-color: var(--green); }

  /* PHASE CARD */
  .phase-card { background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 14px; margin-bottom: 12px; }
  .phase-card-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
  .phase-name { font-size: 15px; font-weight: 600; color: var(--text); }
  .phase-dates { font-size: 11px; color: var(--text3); margin-top: 2px; }
  .phase-load { font-size: 11px; color: var(--text3); margin-top: 2px; }
  .phase-goal { font-size: 12px; color: var(--text2); margin-top: 8px; line-height: 1.5; }
  .phase-chips { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 10px; }
  .chip { font-size: 10px; padding: 3px 8px; border-radius: 6px; font-weight: 500; }
  .chip-green { background: var(--green-bg); color: var(--green); }
  .chip-amber { background: var(--amber-bg); color: var(--amber); }
  .chip-red { background: var(--red-bg); color: var(--red); }

  /* DAY TABS */
  .day-tabs { display: grid; grid-template-columns: repeat(7, minmax(0,1fr)); gap: 4px; margin-bottom: 12px; }
  .day-tab { padding: 8px 2px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg3); text-align: center; cursor: pointer; }
  .day-tab.active { border-color: var(--green); background: var(--green-bg); }
  .day-tab .dn { font-size: 11px; font-weight: 600; color: var(--text2); }
  .day-tab.active .dn { color: var(--green); }
  .day-tab .dt { font-size: 9px; color: var(--text3); margin-top: 2px; }
  .day-dot { width: 5px; height: 5px; border-radius: 50%; margin: 4px auto 0; }

  /* CONTENT CARD */
  .content-card { background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 14px; }

  /* SECTION HEADS */
  .sec-head { font-size: 10px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; color: var(--text3); margin: 14px 0 6px; display: flex; align-items: center; gap: 8px; }
  .sec-head:first-of-type { margin-top: 0; }
  .sec-line { flex: 1; height: 1px; background: var(--border); }

  /* EXERCISE ROWS */
  .ex-row { display: grid; grid-template-columns: minmax(0,1fr) auto; gap: 8px; align-items: center; padding: 9px 10px; border-radius: 8px; background: var(--bg4); margin-bottom: 4px; }
  .ex-row:last-child { margin-bottom: 0; }
  .ex-name { font-size: 12px; font-weight: 500; color: var(--text); }
  .ex-sub { font-size: 10px; color: var(--text3); margin-top: 2px; }
  .ex-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
  .ex-sets { font-size: 11px; color: var(--text2); white-space: nowrap; }
  .badge { font-size: 9px; padding: 2px 7px; border-radius: 5px; font-weight: 600; white-space: nowrap; }
  .b-green { background: var(--green-bg); color: var(--green); }
  .b-blue { background: var(--blue-bg); color: var(--blue); }
  .b-orange { background: var(--orange-bg); color: var(--orange); }
  .b-purple { background: var(--purple-bg); color: var(--purple); }
  .b-amber { background: var(--amber-bg); color: var(--amber); }
  .b-gray { background: rgba(255,255,255,0.06); color: var(--text3); }

  /* CARDIO / RECOVERY ROWS */
  .c-row { display: flex; gap: 10px; padding: 10px; background: var(--bg4); border-radius: 8px; margin-bottom: 4px; }
  .c-row:last-child { margin-bottom: 0; }
  .c-ico { font-size: 18px; flex-shrink: 0; width: 26px; }
  .c-name { font-size: 12px; font-weight: 500; color: var(--text); }
  .c-desc { font-size: 11px; color: var(--text2); margin-top: 2px; line-height: 1.4; }
  .c-dur { font-size: 10px; color: var(--text3); margin-top: 4px; }

  /* NOTE BOX */
  .note-box { margin-top: 12px; padding: 10px 12px; border-left: 2px solid var(--border2); font-size: 11px; color: var(--text3); line-height: 1.6; border-radius: 0 8px 8px 0; background: var(--bg4); }

  /* ALERT */
  .alert { padding: 9px 12px; border-radius: 8px; font-size: 11px; line-height: 1.5; margin-bottom: 10px; }
  .alert-green { background: var(--green-bg); color: #5FE0A8; }
  .alert-purple { background: var(--purple-bg); color: var(--purple); }
  .alert-amber { background: var(--amber-bg); color: var(--amber); }
  .alert-gray { background: var(--bg4); color: var(--text2); }

  /* TIMING CHIPS */
  .t-chips { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 10px; }
  .t-chip { font-size: 10px; padding: 4px 9px; border-radius: 6px; background: var(--bg4); border: 1px solid var(--border); color: var(--text2); }

  /* SCHEME BAR */
  .scheme-row { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 10px; }

  /* SEASON INLINE TAG */
  .in-season-alert { padding: 10px 12px; background: var(--red-bg); border-radius: 8px; font-size: 11px; color: #FF8080; margin-bottom: 10px; line-height: 1.5; }

  /* EMPTY */
  .empty { text-align: center; padding: 30px; color: var(--text3); font-size: 13px; }

  /* UNI DOT */
  .u-dot { display: inline-block; width: 5px; height: 5px; border-radius: 50%; background: var(--amber); margin-right: 4px; vertical-align: middle; }

  /* RUN BLOCK */
  .run-block { margin-top: 12px; border: 1px solid rgba(59,139,219,0.3); border-radius: 10px; overflow: hidden; }
  .run-header { display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; background: rgba(59,139,219,0.10); cursor: pointer; user-select: none; }
  .run-header-left { display: flex; align-items: center; gap: 8px; }
  .run-title { font-size: 12px; font-weight: 600; color: #5BA8F0; }
  .run-optional { font-size: 10px; color: var(--text3); }
  .run-toggle { font-size: 12px; color: var(--text3); transition: transform .2s; }
  .run-toggle.open { transform: rotate(180deg); }
  .run-body { display: none; padding: 10px 12px; border-top: 1px solid rgba(59,139,219,0.2); }
  .run-body.open { display: block; }
  .run-row { display: flex; justify-content: space-between; align-items: flex-start; padding: 7px 0; border-bottom: 1px solid var(--border); }
  .run-row:last-child { border-bottom: none; padding-bottom: 0; }
  .run-day-label { font-size: 11px; font-weight: 500; color: var(--text2); min-width: 70px; }
  .run-dist { font-size: 13px; font-weight: 600; color: #5BA8F0; white-space: nowrap; }
  .run-note { font-size: 11px; color: var(--text3); text-align: right; }
  .run-xc-note { font-size: 11px; color: var(--text3); margin-top: 8px; padding: 7px 10px; background: var(--bg4); border-radius: 6px; line-height: 1.5; }

  .img-modal-bg { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:999; align-items:center; justify-content:center; padding:20px; }
  .img-modal-bg.open { display:flex; }
  .img-modal { background:var(--bg2); border:1px solid var(--border2); border-radius:16px; padding:20px; max-width:380px; width:100%; position:relative; }
  .img-modal-title { font-size:14px; font-weight:600; color:var(--text); margin-bottom:4px; padding-right:32px; }
  .img-modal-tag { font-size:11px; color:var(--text3); margin-bottom:14px; }
  .img-modal-img { width:100%; border-radius:10px; background:var(--bg3); min-height:200px; display:flex; align-items:center; justify-content:center; overflow:hidden; }
  .img-modal-img img { width:100%; border-radius:10px; display:block; }
  .img-modal-img .img-loading { color:var(--text3); font-size:12px; padding:40px; text-align:center; }
  .img-modal-img .img-error { color:var(--text3); font-size:12px; padding:30px; text-align:center; line-height:1.6; }
  .img-modal-desc { font-size:11px; color:var(--text2); margin-top:12px; line-height:1.6; }
  .img-modal-close { position:absolute; top:14px; right:14px; background:var(--bg4); border:none; color:var(--text2); font-size:18px; width:28px; height:28px; border-radius:50%; cursor:pointer; display:flex; align-items:center; justify-content:center; line-height:1; }
  .img-btn { display:inline-flex; align-items:center; gap:4px; font-size:10px; padding:2px 7px; border-radius:5px; background:rgba(59,139,219,0.15); color:#5BA8F0; border:none; cursor:pointer; margin-left:6px; font-weight:600; vertical-align:middle; }
  .b-teal { background:rgba(29,184,122,0.1); color:#1DB87A; }

  /* DAY CHECKBOX */
  .day-check-bar { margin-top: 12px; display: flex; align-items: center; justify-content: space-between; padding: 10px 12px; background: var(--bg3); border: 1px solid var(--border); border-radius: 10px; cursor: pointer; -webkit-tap-highlight-color: transparent; user-select: none; }
  .day-check-bar.checked { background: rgba(29,184,122,0.1); border-color: rgba(29,184,122,0.4); }
  .day-check-left { display: flex; align-items: center; gap: 10px; }
  .day-check-box { width: 22px; height: 22px; border-radius: 6px; border: 1.5px solid var(--border2); background: var(--bg4); display: flex; align-items: center; justify-content: center; font-size: 14px; color: transparent; flex-shrink: 0; transition: background .12s, border-color .12s; }
  .day-check-bar.checked .day-check-box { background: #1DB87A; border-color: #0F6E56; color: #04342C; }
  .day-check-label { font-size: 12px; font-weight: 500; color: var(--text2); }
  .day-check-bar.checked .day-check-label { color: #1DB87A; }
  .day-check-streak { display: flex; gap: 3px; align-items: center; }
  .dcs-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--border2); }
  .dcs-dot.lit { background: #1DB87A; }
  .day-check-week { font-size: 10px; color: var(--text3); }

  /* PROGRESS TAB */
  .prog-stats { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 8px; margin-bottom: 1rem; }
  .prog-stat { background: var(--bg3); border-radius: 10px; padding: 10px 12px; }
  .prog-stat-val { font-size: 22px; font-weight: 600; color: var(--green); }
  .prog-stat-lbl { font-size: 11px; color: var(--text3); margin-top: 2px; }
  .prog-bar-wrap { height: 5px; background: var(--border); border-radius: 3px; margin-bottom: 1.25rem; overflow: hidden; }
  .prog-bar-fill { height: 100%; background: var(--green); border-radius: 3px; transition: width .4s; }
  .prog-phase-block { margin-bottom: 1rem; }
  .prog-phase-head { font-size: 11px; font-weight: 500; letter-spacing: .05em; text-transform: uppercase; margin-bottom: 6px; display: flex; justify-content: space-between; align-items: center; }
  .prog-phase-ct { font-size: 10px; color: var(--text3); font-weight: 400; letter-spacing: 0; text-transform: none; }
  .prog-week-grid { display: grid; grid-template-columns: repeat(6, minmax(0,1fr)); gap: 5px; }
  .prog-wk { aspect-ratio: 1; border-radius: 8px; border: 0.5px solid var(--border); background: var(--bg3); display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; -webkit-tap-highlight-color: transparent; transition: background .1s, border-color .1s; }
  .prog-wk:active { transform: scale(0.91); }
  .prog-wk.done { background: var(--green); border-color: #0F6E56; }
  .prog-wk.cur { border: 2px solid var(--green); }
  .prog-wk-num { font-size: 11px; font-weight: 500; color: var(--text2); }
  .prog-wk.done .prog-wk-num { color: #04342C; }
  .prog-wk-chk { font-size: 13px; color: #04342C; display: none; }
  .prog-wk.done .prog-wk-chk { display: block; }
  .prog-wk.done .prog-wk-num { display: none; }
  .prog-wk-date { font-size: 9px; color: var(--text3); margin-top: 1px; }
  .prog-wk.done .prog-wk-date { color: #085041; }
  .prog-reset { margin-top: 1rem; text-align: center; }
  .prog-reset-btn { font-size: 11px; color: var(--text3); background: none; border: 0.5px solid var(--border); border-radius: 6px; padding: 5px 14px; cursor: pointer; }
  .prog-legend { display: flex; gap: 12px; margin-bottom: 1rem; flex-wrap: wrap; }
  .prog-leg { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text3); }
  .prog-leg-dot { width: 10px; height: 10px; border-radius: 3px; }
</style>
</head>

function makeDayTabs(containerId, curDayVar, setter) {

function buildSections(sections, scheme) {
  return sections.map(s => `
    <div class="sec-head">${s.label}<span class="sec-line"></span></div>
    ${s.rows.map(r => {
      const reps = scheme ? scheme[r.rep] : r.d;
      const setsRaw = scheme ? scheme[r.rep] : '';
      let setsStr = '', repsStr = '';
      if(scheme && setsRaw && setsRaw.includes('×')) {
        setsStr = setsRaw.split('×')[0]+' sets';
        repsStr = setsRaw.split('×')[1]+' reps';
      } else if(scheme) {
        setsStr = setsRaw; repsStr = '';
      } else {
        setsStr = r.d; repsStr = '';
      }
      return `<div class="ex-row">
        <div>
          <div class="ex-name">${r.uni?'<span class="u-dot"></span>':''}${r.n}${imgBtn(r.n)}</div>
          ${repsStr?`<div class="ex-sub">${repsStr}</div>`:''}
        </div>
        <div class="ex-right">
          <div class="ex-sets">${setsStr}</div>
          <span class="badge ${r.bc}">${r.badge}</span>
        </div>
      </div>`;
    }).join('')}`).join('');
}

function buildCardioRows(rows) {
  return rows.map(r=>`<div class="c-row">
    <div class="c-ico">${r.ico}</div>

      <div class="c-dur">${r.dur}</div>
    </div>
  </div>`).join('');
}

let runOpen = false;
function toggleRun() {
  runOpen = !runOpen;
  const body = document.getElementById('runBody');
  const toggle = document.getElementById('runToggle');
  if(body) { body.classList.toggle('open', runOpen); }
  if(toggle) { toggle.classList.toggle('open', runOpen); toggle.textContent = runOpen ? '▲' : '▼'; }
}

function buildRunBlock(phaseId, dayIndex) {
  const plan = RUN_PLAN[phaseId];
  if(!plan) return '';
  const day = plan[dayIndex];
  if(!day) return '';

  // Build full week summary when showing any day, highlight the selected day
  const rows = plan.map((d,i) => {
    const isToday = i === dayIndex;
    const dist = d.mi !== null ? d.mi + ' mi' : '— rest';
    const paceColor = d.mi === null ? 'color:var(--text3)' : isToday ? 'color:#5BA8F0' : 'color:var(--text2)';
    return `<div class="run-row" style="${isToday?'background:rgba(59,139,219,0.07);margin:0 -4px;padding:7px 4px;border-radius:6px;':''}">
      <div class="run-day-label" style="${isToday?'color:#5BA8F0;font-weight:600':''}">${d.day}</div>
      <div style="flex:1;padding:0 8px">
        <div class="run-dist" style="${paceColor}">${dist}</div>
        ${d.pace?`<div class="run-note">${d.pace}</div>`:''}
      </div>
      <div style="max-width:160px;text-align:right"><div class="run-note">${d.note}</div></div>
    </div>`;
  }).join('');

  const todayDist = day.mi !== null ? day.mi + ' mi' : 'Rest day';
  const openState = runOpen ? 'open' : '';

  return `<div class="run-block">
    <div class="run-header" onclick="toggleRun()">
      <div class="run-header-left">
        <span style="font-size:16px">🏃</span>
        <div>
          <div class="run-title">Half marathon training — ${todayDist}</div>
          <div class="run-optional">Optional · not needed if doing XC · tap to expand week</div>
        </div>
      </div>
      <span class="run-toggle ${openState}" id="runToggle">${runOpen?'▲':'▼'}</span>
    </div>
    <div class="run-body ${openState}" id="runBody">
      ${rows}
      <div class="run-xc-note">🎽 XC athletes: your practice runs already cover this volume. Treat these distances as a guide only — skip any day where practice load is already high.</div>
    </div>
  </div>`;
}

// ----- DAY CHECKBOXES -----
// Key format: "p{phaseIndex}_d{dayIndex}" e.g. "p0_d0" = Phase1, Monday
let dayChecks = {};
(function loadChecks(){
  try { dayChecks = JSON.parse(localStorage.getItem('mclifts_daychecks') || '{}'); } catch(e){ dayChecks={}; }
})();
function saveChecks(){ try{ localStorage.setItem('mclifts_daychecks', JSON.stringify(dayChecks)); }catch(e){} }
function checkKey(pi, di){ return 'p'+pi+'_d'+di; }
function isDayChecked(pi, di){ return !!dayChecks[checkKey(pi,di)]; }
function toggleDayCheck(pi, di){ const k=checkKey(pi,di); dayChecks[k]=!dayChecks[k]; saveChecks(); renderScheduleContent(); }

function buildDayCheckbox(phaseIdx, dayIdx) {
  const checked = isDayChecked(phaseIdx, dayIdx);
  const dayNames = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
  const dayName = dayNames[dayIdx];

  // build last-7-days streak dots (same day of week across last 7 phase slots)
  const dotHtml = Array.from({length:7}, (_,i) => {
    const lit = isDayChecked(phaseIdx - i, dayIdx) && phaseIdx - i >= 0;
    return `<div class="dcs-dot ${lit?'lit':''}"></div>`;
  }).reverse().join('');

  // count total checks for this day across all phases
  const totalForDay = Object.keys(dayChecks).filter(k => k.endsWith('_d'+dayIdx) && dayChecks[k]).length;

  return `<div class="day-check-bar ${checked?'checked':''}" onclick="toggleDayCheck(${phaseIdx},${dayIdx})">
    <div class="day-check-left">
      <div class="day-check-box">${checked?'&#10003;':''}</div>
      <div>
        <div class="day-check-label">${checked?dayName+' done':'Mark '+dayName+' complete'}</div>
        <div class="day-check-week">${totalForDay > 0 ? totalForDay+' total '+dayName+'s logged' : 'Not yet logged'}</div>
      </div>
    </div>
    <div class="day-check-streak">${dotHtml}</div>
  </div>`;
}

function renderScheduleDays() { makeDayTabs('scheduleDays', schedDay, 'setSchedDay'); }
function renderScheduleContent() {
  const p=PHASES[curPhase];
  const d=DAY_DESCRIPTIONS[schedDay];
  const wk=WEEK_DAYS[schedDay];
  let html='';
  const isLean = curPhase>=5;
  if(isLean&&d.type==='lift') {
    const leanData = schedDay===0?LEAN_A:schedDay===2?LEAN_B:LEAN_C;
    const schemeBank = curPhase===6 ? P7_SCHEMES : LEAN_SCHEMES;
    const ls = schemeBank[leanData.schemeKey];
    html+=`<div class="in-season-alert">${ls.label} · 6 exercises · under 60 min</div>`;
  }
  if(d.type==='lift') {
    const fullData = schedDay===0?LIFT_A:schedDay===2?LIFT_B:LIFT_C;
    const leanData = schedDay===0?LEAN_A:schedDay===2?LEAN_B:LEAN_C;
    const ldata = isLean ? leanData : fullData;
    const schemeBank = curPhase===6 ? P7_SCHEMES : LEAN_SCHEMES;
    const scheme = isLean ? schemeBank[leanData.schemeKey] : p.scheme;
    html+=`<div class="scheme-row">`;
    p.chips.forEach(c=>{html+=`<span class="chip ${c.c}">${c.t}</span>`;});
    html+=`</div>`;
    if(isLean && ldata.label) html+=`<div style="font-size:11px;font-weight:500;color:var(--green);margin-bottom:8px">${ldata.label}</div>`;
    html+=buildSections(ldata.sections, scheme);
    const note = isLean ? ldata.note : d.note;
    html+=`<div class="note-box">${note}</div>`;

  'Leg swing — lateral':                     'Swing leg side to side across the body. Hip adductor and abductor warm-up.',
  'Walking lunge with rotation':              'Step into lunge, rotate torso toward the front leg. Hip and thoracic mobility combined.',
  'Arm circle — forward and back':            'Full circles from the shoulder. Start small and increase range. Shoulder warm-up.',
  "World's greatest stretch":                'Lunge forward, hand to floor, rotate arm to ceiling. Best single warm-up movement.',
  'Hip 90/90 flow':                          'Sit with both legs in 90 degree bent position. Rotate hips to bring front shin flat, then switch.',
  'Thoracic rotation (kneeling)':            'Half-kneeling, hand behind head, rotate elbow to the ceiling. T-spine mobility.',
  'Pigeon pose':                              'Front shin across, back leg long. Sit into the hip. Deep glute and external rotator stretch.',
  'Couch stretch (quad / hip flexor)':        'Rear foot up the wall, knee on floor. Drive hip forward. Deep quad and hip flexor.',
  'Doorway chest stretch':                    'Forearm on doorframe, step through. Targets pec minor and anterior shoulder.',
  'Lat stretch (hang or band)':               'Hang from bar or pull with band overhead. Full lat lengthening.',
  'Supine hamstring stretch':                 'Lie flat, raise one leg and hold. Keep opposite leg on the floor.',
  "Child's pose with reach":                 'Sit back on heels, arms reaching forward. Lat, thoracic, and shoulder stretch combined.',
  'Standing calf stretch — straight knee':    'Foot flat, lean into wall. Straight knee targets the gastrocnemius.',
  'Standing calf stretch — bent knee (soleus)':'Bend the knee slightly. Shifts load to the soleus, the deeper calf.',
  'Hip flexor lunge stretch':                 'Deep lunge, back knee down. Tuck the pelvis to increase the hip flexor stretch.',
  'Seated groin stretch':                     'Soles of feet together, press knees toward floor. Inner thigh and groin.',
  '90/90 hip flow — active rotation':         'Active movement through the 90/90 position. Rotate hips, move through range.',
  'Pancake stretch (wide squat hold)':        'Wide stance, fold forward between the legs. Groin and inner thigh deep stretch.',
  'Thread-the-needle (thoracic)':             'On all fours, thread one arm under the body and rotate. Deep thoracic stretch.',
  'Quadruped thoracic rotation':              'On all fours, hand behind head, rotate elbow to ceiling then toward floor.',
  'Ankle dorsiflexion wall stretch':          'Toes against wall, knee drives forward. Calf and dorsiflexion stretch.',
  'Neck half-circles (slow)':                 'Drop chin to chest, slowly roll ear to shoulder each way. Never roll fully back.',
  // ── ANGLE BOARD ──
  'Angle board dorsiflexion stretch':                    'Stand on angle board with toes elevated. Drive knee forward over toes, hold at end range. Best dorsiflexion tool available.',
  'Angle board calf stretch — straight knee':            'On angle board, heel low, toes elevated. Straight leg targets the gastrocnemius belly. Lean gently into wall.',
  'Angle board calf stretch — bent knee (soleus)':       'Same position on angle board but bend the knee 20-30 degrees. Shifts stretch deep into the soleus and Achilles insertion.',
  'Single-leg calf raise on angle board (3s up / 3s down)':'Perform calf raise with toes elevated on angle board. Greater range of motion than flat floor — full stretch at bottom, squeeze at top.',
  'Tibialis raise (heels on angle board edge)':          'Heels on the raised edge of the angle board, raise toes maximally. Angle board increases ROM for the tibialis anterior.',
  'Weighted tibialis raise (plate on foot)':              'Rest a 2.5–5lb plate on top of the foot. Same motion as bodyweight tibialis raise. Start light — the tibialis fatigues fast. Progress load weekly once 3×20 feels easy. The primary shin splint prevention progression.',
  'Single-leg balance on angle board — eyes open':       'Stand on one foot on the angle board. The incline challenges ankle in dorsiflexion-loaded position. Hands out for safety first.',
  'Single-leg balance on angle board — eyes closed':     'Progress from eyes open. Removing visual input forces the ankle to rely purely on proprioceptive feedback.',
  'Lateral hop + stick on angle board (hold 2s)':        'Hop laterally and land on the angle board. The inclined surface makes the stick challenge significantly harder.',
  'Lateral bound + stick on angle board':                'Bound laterally and land on angle board, absorb and hold. Trains reactive ankle stability on an unstable inclined surface.',
  // ── PHYSIO BALL — ANKLE ──
  'Physio ball alphabet (ABCs)':                         'Sit with ankle resting on the 2lb physio ball. Use your ankle to trace every letter of the alphabet. Moves the joint through full ROM in all planes.',
  'Physio ball ankle circles — slow CW and CCW':         'Ankle on physio ball, trace slow full circles clockwise then counterclockwise. The light resistance of the ball adds neuromuscular demand.',
  'Physio ball figure-8 trace':                          'Ankle on physio ball, trace a figure-8 pattern. Combines frontal and sagittal plane movement for comprehensive joint mobility.',
  'Physio ball single-leg balance roll':                 'Stand on one foot on top of the physio ball — very advanced. Start by just holding onto something and placing the ball under the foot. Build to full freestanding.',
  // ── PHYSIO BALL — SHOULDER ──
  'Physio ball wall circles (shoulder CARs)':            'Press the 2lb physio ball against the wall with one hand. Make slow controlled circles — small to large. Wakes up the RC and builds shoulder CARs (controlled articular rotations).',
  'Physio ball shoulder ABCs (arm on ball, trace alphabet)': 'Rest the back of the hand or wrist on the physio ball against the wall. Use the shoulder to trace every letter of the alphabet — slow and deliberate. Moves the joint through full range in all planes. Excellent RC warm-up and neuromuscular activation.',
  'Weighted physio ball shoulder ABCs':                  'Same as the bodyweight version but hold a 2.5–5lb weight in the free hand while tracing. The added load increases the rotator cuff demand through the full alphabet movement. Progress to this once the bodyweight version feels fully controlled.',
  'Physio ball scapular clock (arm on ball, trace clock)':'Forearm resting on physio ball against the wall. Trace clock positions 12, 3, 6, 9 by moving the scapula, not the arm. Isolates scapular control.',
  'Physio ball prone ball roll-out':                     'Lie prone, hands on physio ball. Roll ball forward and back while keeping core braced. Serratus and scapular stability under load.',
  'Physio ball push-up plus (hands on ball)':            'Push-up position with both hands on physio ball. At the top, push through to protract scapulae fully. Instability forces RC engagement.',
  'Physio ball single-arm balance hold':                 'One hand pressed into physio ball on the floor, hold the position. Demands continuous RC activation to stabilize the unstable surface.',
  // ── OSCILLATING BAR — ANKLE ──
  'Oscillating bar — Achilles and calf':                      'Apply oscillating bar along the Achilles tendon and calf belly with moderate pressure and vibration. Reduces tissue tone before dorsiflexion work.',
  'Oscillating bar — lateral ankle and peroneals':            'Run oscillating bar along the outside of the ankle and up the peroneals. Loosens lateral chain tissue before stability work.',
  'Oscillating bar — plantar fascia (sole of foot)':          'Apply along the arch and heel. Prep work before loading the foot — especially valuable after long runs or heavy days.',
  // ── OSCILLATING BAR — SHOULDER ──
  'Oscillating bar — pec minor and anterior shoulder':        'Run oscillating bar across the pec minor and front of the shoulder. Reduces tissue tension before pressing — helps the posterior capsule mobilize more freely.',
  'Oscillating bar — posterior capsule and rear delt':        'Apply oscillating bar across the back of the shoulder and rear delt. Prep for sleeper stretch — loosens the posterior capsule.',
  'Oscillating bar — upper trap and levator scapulae':        'Run oscillating bar along the upper trap from shoulder to neck base. Reduces tone in muscles that restrict overhead range.',
  // ── OSCILLATING BAR — HIP ──
  'Oscillating bar — hip flexor and TFL':                     'Apply oscillating bar along the front of the hip and TFL (outer hip). Reduces tone in hip flexors that restrict extension — do before hip mobility work.',
  'Oscillating bar — glute and piriformis':                   'Apply to the glute and deep into the piriformis area. Moderate pressure with vibration. Key prep before clamshells and hip rotational work.',
  'Oscillating bar — IT band and lateral hip':                'Run oscillating bar along the IT band and lateral hip. Prep for lateral chain before banded lateral walks and abduction work.',
  'Oscillating bar — adductors (inner thigh)':               'Apply along the inner thigh adductors. Inner thigh is often the tightest hip structure in wrestlers — critical prep before lateral lunge and banded sumo work.',
  // ── HIP MOBILITY ──
  'Hip 90/90 active rotation':                                'Sit with both legs in 90 degree position. Actively rotate hips to drop the front shin flat, pause, switch sides. Builds active internal rotation range.',
  'Hip CARs (controlled articular rotations)':               'Stand on one leg, lift the other and make the largest possible slow hip circle — forward, out, back, in. Own every degree of range through the full circle.',
  'Deep squat hip rock':                                      'Sit at the bottom of a squat, hands on floor. Rock hips side to side, loading each hip in deep flexion alternately. Opens groin and hip capsule.',
  'Lateral lunge hip stretch — hold at bottom':               'Step wide into a lateral lunge and sit at the bottom. Hold with the hip loaded, breathe into the stretch. Deep adductor and lateral hip.',
  'Pigeon pose — active breathing':                           'Front shin across, back leg long. Each exhale, actively sink deeper into the hip. Breathing drives the stretch rather than passive time.',
  'Couch stretch — hip flexor':                               'Rear foot on wall, knee on floor. Tuck the pelvis to remove the lower back arch — that tuck is what makes this stretch actually target the hip flexor.',
  // ── BANDED HIP — ACTIVATION ──
  'Banded clamshell':                                         'Band above knees, side lying, hips at 45 degrees. Open the top knee like a clamshell — do not let the pelvis rotate back. Highest priority glute med exercise.',
  'Banded lateral walk (monster walk)':                       'Band above or below knees, athletic stance. Step laterally keeping constant band tension. Do not let feet come together. Glute med endurance.',
  'Banded hip abduction — standing':                          'Band above ankle, stand on one leg, kick the banded leg out to the side. Slow and controlled. Keep the standing hip stable, no lateral lean.',
  'Banded hip extension — standing kickback':                 'Band at ankle, kick straight back. Squeeze the glute at the top. Keep the lower back still — movement comes from the hip, not the spine.',
  'Banded hip thrust (band across hips)':                     'Band across the hips adds resistance at the top of the thrust where a barbell loses tension. Drive through the heel, squeeze hard at top, hold 1s.',
  'Banded sumo squat pulse':                                  'Band above knees, wide sumo stance. Pulse at the bottom third of the squat. Drives glute med and adductor simultaneously — great for wrestling base position.',
  // ── BANDED HIP — ROTATIONAL ──
  'Banded diagonal hip drive (forward + across)':             'Band anchored to the side, step forward and across the midline with one leg. Trains the hip in the transverse plane — mirrors wrestling stance transitions.',
  'Banded pull-through (hip hinge)':                         'Cable or band between legs from behind. Hinge forward, let the band pull back, then drive hips through explosively. Teaches hip-dominant movement pattern.',
  'Banded standing hip IR + ER':                              'Band at ankle, stand on one leg. Rotate the free leg internally then externally against the band. Trains active hip rotation range — critical for wrestling base control.',
  'Banded fire hydrant':                                      'Band above knees, quadruped. Lift one knee out to the side. Keep the pelvis square. Hits glute med from a different angle than clamshells.',
  'Banded bird dog':                                          'Band around wrists or ankles. Quadruped, extend opposite arm and leg against band resistance. Challenges core stability and hip stability simultaneously.',
  // ── PHYSIO BALL — HIP ──
  'Physio ball supine hip bridge hold':                       'Lie on back, both heels on physio ball. Drive hips up to bridge and hold. The unstable ball demands continuous hamstring and glute activation.',
  'Physio ball single-leg hip bridge':                        'One foot on ball, other leg raised. Much harder than two feet — forces the hip stabilizers to work overtime to keep the ball from rolling.',
  'Physio ball lateral hip roll':                             'Lie on side, physio ball at outer hip. Slowly roll the hip back and forth over the ball. Passive release of the TFL and lateral glute.',
  'Physio ball seated hip CARs':                             'Sit on bench, physio ball between knees. Lift one knee while squeezing ball with the other. Adds adductor co-contraction to the hip CAR movement.',
  // ── WRESTLING HIP ──
  'Banded level change — resisted shot':                      'Band around hips anchored behind. Drive a level change and penetration step against the resistance. Trains hip drive into the shot — directly sport specific.',
  'Banded hip shift — lateral stance load':                   'Band pulling from one side, shift hips laterally against it. Trains the stance hip to resist lateral force — mirrors defending a single leg.',
  'Single-leg hip hinge to drive (hip pop)':                  'Stand on one leg, hinge at the hip, then explosively pop the hip through to full extension. Builds single-leg hip power for level changes and sprawls.',
  'Deep squat hold to explosive stand':                       'Hold the bottom of a deep squat for 3s, then explode to standing as fast as possible. Trains the stretch-shortening cycle from the wrestling stance position.',
  // ── GRIP AND WRIST ──
  'Grip tool squeezes (50 / hand)':       '50 full squeezes per hand per day — squeeze all the way closed, release fully each rep. Use the grip tool daily, separate from lifting. Build toward holding the squeeze for 1–2s each rep as you get stronger.',
  'Towel pull-up':                         'Drape a thick towel over a bar and grip both ends. Pull up normally. The unstable thick grip taxes the forearm flexors and extensors far harder than a standard bar — starts easier than you think, gets brutal fast.',
  'Plate pinch hold':                      'Pinch two weight plates smooth-side out between your thumb and fingers. Hold for time. Develops the pincer strength critical for wrestling wrist and hand control.',
  'Dead hang (straight arm)':             'Hang from the bar with straight arms. Do not engage the shoulders — fully passive hang. Decompresses the spine, stretches the shoulder capsule passively, and builds grip endurance simultaneously.',
  'Farmer carry — grip focus (light to moderate)': 'Lighter than the heavy carry — focus entirely on squeezing the handle continuously throughout the walk. No relaxing the grip between steps. Builds grip endurance under fatigue.',
  'Wrist roller — up and down':            'Roll the weight up by winding the rope, then slowly lower it by unrolling. Both directions train different parts of the forearm. Keep your arms parallel to the floor throughout.',
  'Reverse curl (barbell or DB)':         'Palms facing down, curl up. Trains the wrist extensors and brachioradialis — the muscles that balance the forearm and are almost always undertrained relative to biceps. Key for healthy elbow and wrist.',
  'Rice bucket — full protocol':          'Plunge hand into rice bucket. Cycle through: open-close fingers 20×, rotate wrist CW + CCW 20×, finger spread 20×, grip and twist 20×. Builds grip in every plane simultaneously.',
  'Finger extension — band':              'Wrap a thick rubber band or finger extension band around all fingers. Spread them against the resistance. Balances the grip flexors — prevents the chronic tendon issues common in heavy grappling athletes.',
  // ── EXPLOSIVE / PLYOMETRIC ──
  'Broad jump':                               'Load hips back, swing arms, jump for max horizontal distance. Soft two-foot landing, absorb through hips and knees.',
  'Lateral hurdle hop':                       'Quick lateral hops over hurdle or line. Minimize ground contact time. Stay on balls of feet.',
  'Reactive drop step':                       'Drop step in one direction on a visual or audio cue. Drive off the outside foot explosively.',
  'Rotational med ball wall throw':           'Load the hip, rotate through the core, release ball into wall with full power. Reset and repeat.',
  'Med ball overhead slam':                   'Reach full extension overhead, slam ball into floor with max force. Catch on bounce or reset.',
  'Med ball chest pass jump':                 'Squat, load, then simultaneously jump and chest pass the ball. Power from legs transfers into the throw.',
  'Resisted level change drill':              'Band or partner resists the level change. Drive hips through the resistance on the shot.',
  'Sprawl to base (explosive)':               'From standing, snap hips hard to the floor on the sprawl, then explode back to base position immediately.',
  'Sandbag shouldering':                      'Straddle the bag, squat, drive hips and load the bag to one shoulder in one explosive movement.',
  'Box jump (max height)':                    'Full hip extension at takeoff — do not cheat the jump. Step down from box, never jump down.',
  'Single-leg box jump':                      'Takeoff from one foot, land on two feet on the box. Control the landing before stepping down.',
  'Depth drop to broad jump':                 'Step off box, absorb the landing with soft knees, immediately redirect into a max broad jump. Minimize ground contact.',
  'Power clean':                              'Bar from floor — explosive pull, shrug, pull elbows through, catch in a quarter squat. Full hip extension at the top.',
  'Hang snatch or high pull':                 'From hang position just above the knee. Explosive shrug and pull — snatch catches overhead, high pull stops at chin.',
  'Push jerk':                                'Dip with the knees, drive explosively, drop under the bar and lock out overhead. Stand to finish.',
  'Landmine full-contact twist':              'Arms extended, rotate bar powerfully from hip to hip. Full hip pivot each rep. Drive from legs not arms.',
  'Depth drop to broad jump':                 'Step off box, absorb, immediately redirect into max broad jump. Keep ground contact time minimal.',
  'Reactive shuffle and 10m sprint':          'Lateral shuffle for 3–4 steps, then explode into a 10m sprint on command. Simulates mat movement.',
  'Yoke or barbell carry':                    'Load on traps or yoke. Walk as fast as possible with tight core and tall posture. Builds clinch strength and bracing.',
  'Sandbag shouldering and walk':             'Shoulder the bag explosively, walk 20m with it loaded. Mirrors wrestling body control under load.',
  'Match simulation drilling':               'Partner drilling at match intensity. 2 min on, 30s off. Treat each round as a real period.',
  // ── BATTLE ROPES ──
  'Battle rope alternating waves':           'Hold one end of each rope, alternate arms up and down creating a wave pattern. Stay in athletic stance, knees bent. Drive from the hips and core — not just the arms. The wave should travel all the way to the anchor.',
  'Battle rope lateral slam':                'Both ropes together, slam them to the left then the right alternately. Rotate through the core each slam. Directly mirrors the rotational mechanics of a wrestling snap-down or head control.',
  'Battle rope power slam':                  'Raise both ropes overhead, then drive them down into the floor with maximum force. Reset fully between each rep — this is a power exercise, not a conditioning one. 10 reps with full intent beats 20 sloppy ones.',
  'Battle rope double wave':                 'Both ropes moving simultaneously up and down. Harder than alternating waves — demands full bilateral effort. Stay tall, push through the legs as well as the arms.',
  'Battle rope squat to wave':               'Start in a squat, explode upward and slam the ropes simultaneously at the top of the jump. Links lower body power into the rope movement — trains the kinetic chain from feet to hands.',
  'Battle rope grappler toss':               'Rotate and slam both ropes to one side in one explosive movement — like throwing an opponent in a hip toss. Pivot through the feet, rotate the hips, drive through the shoulder. Alternate sides each rep.',
  'Battle rope outside circles':             'Both ropes, make large outward circles simultaneously. Continuous tension on the shoulder. Great warm-up and rotator cuff activation — easier than waves, good for opening sessions.',
  'Battle rope lateral shuffle wave':        'Alternate waves while shuffling laterally. Foot speed and arm endurance simultaneously. Simulates wrestling stance movement under fatigue.',
  'Battle rope sprint':                      'Alternating waves at absolute maximum speed for a very short burst. Think of it like a 10–15s all-out sprint — maximum arm turnover rate. Full rest between sets.',
  'Battle rope jump slam':                   'Jump and slam both ropes simultaneously on landing. The landing force transfers into the slam. Triple extension — ankles, knees, hips — before the slam.',
  'Battle rope single-arm wave':             'One rope, one arm. The unilateral demand challenges the core to resist rotation while producing the wave. Builds shoulder stability and unilateral endurance.',
  'Battle rope rotational slam':             'Stand sideways to the anchor. Slam both ropes to the far side using full hip rotation. Pivot the back foot. Most wrestling-specific movement pattern in the battle rope toolkit.',
  // ── CARDIO ──
  'Sprint intervals':                         'All-out effort for the full distance. Full recovery between reps — these are not tempo runs.',
  'Assault bike intervals':                   '30s max effort on the assault bike — arms and legs. Track your wattage and try to hold it across rounds.',
  'Pool sprint sets':                         'Sprint each 50m rep hard. Focus on breath control and flip turns. Active rest on the wall.',
  'Grip and neck prehab':                     'Towel pull-ups build wrestling-specific grip. Neck bridging done slowly with full control — never rush.',
};

function showExDemo(name) {
  const cue = EX_CUES[name] || null;
  const query = encodeURIComponent(name + ' exercise tutorial');
  const ytUrl = 'https://www.youtube.com/results?search_query=' + query;
  document.getElementById('imgModalTitle').textContent = name;
  document.getElementById('imgModalTag').textContent = cue ? 'Coaching cue' : '';
  document.getElementById('imgModalDesc').textContent = cue || '';
  document.getElementById('imgModalImg').innerHTML = `
    <div style="padding:20px;text-align:center;width:100%">
      <div style="font-size:13px;color:var(--text2);margin-bottom:16px;line-height:1.5">Tap below to watch a demo on YouTube. Opens in Safari.</div>
      <a href="${ytUrl}" target="_blank" style="display:inline-block;background:#FF0000;color:#fff;font-size:13px;font-weight:600;padding:12px 24px;border-radius:8px;text-decoration:none">&#9654; Watch on YouTube</a>
      <div style="font-size:11px;color:var(--text3);margin-top:12px">Searches: "${name}"</div>
    </div>`;
  document.getElementById('imgModalBg').classList.add('open');
}
function closeModal() { document.getElementById('imgModalBg').classList.remove('open'); }
function closeImgModal(e) { if(e.target===document.getElementById('imgModalBg')) closeModal(); }

function imgBtn(name) {
  return `<button class="img-btn" onclick="showExDemo('${name.replace(/'/g,"\\'")}')">&#9654; demo</button>`;
}

function renderHipContent() {
  let html=`<div class="t-chips" style="margin-bottom:10px">
    <span class="t-chip">Daily: 10–12 min</span>
    <span class="t-chip">Best done: pre-session or evening</span>
    <span class="t-chip">Oscillating bar first, then banded work</span>
  </div>`;
  html+=`<div class="alert alert-gray" style="margin-bottom:10px">Hip strength and mobility is the engine of wrestling — takedowns, scrambles, and defensive base all load the hip. The oscillating bar loosens tissue before banded activation and loaded movement. Tap <span style="color:#5BA8F0;font-weight:600">▶ demo</span> on any exercise.</div>`;
  html+=buildSections(HIP_SECTIONS, null);
  html+=`<div class="note-box">Banded clamshells and lateral walks are the highest-priority exercises here — glute med weakness is one of the most common contributors to knee, hip, and low back issues in wrestlers. Run those every single day. The full protocol 3–4×/week is plenty.</div>`;
  document.getElementById('hipContent').innerHTML=html;
}

  html+=LANDMINE_SECTIONS.map(s=>`
    <div class="sec-head">${s.label}<span class="sec-line"></span></div>
    <div>${s.rows.map(r=>`<div class="ex-row">
      <div class="ex-name">${r.n}${imgBtn(r.n)}</div>
      <div class="ex-right">
        <div class="ex-sets">${r.d}</div>
        <span class="badge ${r.bc}">${r.badge}</span>
      </div>
    </div>`).join('')}</div>`).join('');
  html+=`<div class="note-box">Setup: wedge the bar into a corner or use a landmine attachment. Keep the working shoulder packed down throughout all pressing movements. On rotational work, drive from the hips — the arms just guide the bar. Start lighter than you think — the rotational loading is deceptive.</div>`;
  document.getElementById('landmineContent').innerHTML=html;
}

// ----- SECTION SWITCHING -----
function switchSection(id) {
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById('sec-'+id).classList.add('active');
  document.querySelectorAll('.main-nav button').forEach((b,i)=>{
    const ids=['progress','schedule','lifting','explosive','cardio','stretch','ankle','shoulder','hip','landmine'];
    b.classList.toggle('active', ids[i]===id);
  });
}

// ----- PROGRESS TAB -----
const PROG_PHASES=[
  {name:'P1 — Base building',   color:'#1D9E75', weeks:[1,2,3]},
  {name:'P2 — Hypertrophy',     color:'#378ADD', weeks:[4,5,6,7,8,9]},
  {name:'P3 — Strength',        color:'#7F77DD', weeks:[10,11,12,13,14,15,16]},
  {name:'P4 — Peaking',         color:'#D85A30', weeks:[17,18]},
  {name:'P5 — Preseason',       color:'#BA7517', weeks:[19,20]},
  {name:'P6 — Early season',    color:'#E24B4A', weeks:[21,22,23]},
  {name:'P7 — In-season',       color:'#888780', weeks:[24]},
];
const PROG_WEEK_STARTS=['Jun 2','Jun 9','Jun 16','Jun 23','Jun 30','Jul 7','Jul 14','Jul 21','Jul 28','Aug 4','Aug 11','Aug 18','Aug 25','Sep 1','Sep 8','Sep 15','Sep 22','Sep 29','Oct 6','Oct 13','Oct 20','Oct 27','Nov 3','Nov 10'];
const PROG_TOTAL=24;

let wkChecked=[];
(function loadWkChecks(){try{wkChecked=JSON.parse(localStorage.getItem('mclifts_wks')||'[]');}catch(e){wkChecked=[];}})();
function saveWkChecks(){try{localStorage.setItem('mclifts_wks',JSON.stringify(wkChecked));}catch(e){}}
function toggleWk(wk){const x=wkChecked.indexOf(wk);x===-1?wkChecked.push(wk):wkChecked.splice(x,1);saveWkChecks();renderProgressContent();}
function resetWks(){wkChecked=[];saveWkChecks();renderProgressContent();}

// auto-detect current week from date
function getCurrentWeek(){
  const start=new Date('2026-06-02');
  const now=new Date();
  const diff=Math.floor((now-start)/(7*24*60*60*1000))+1;
  return Math.min(Math.max(diff,1),PROG_TOTAL);
}

function renderProgressContent(){
  const done=wkChecked.length;
  const pct=Math.round((done/PROG_TOTAL)*100);
  const curWk=getCurrentWeek();

  let html=`<div class="prog-stats">
    <div class="prog-stat"><div class="prog-stat-val">${done}</div><div class="prog-stat-lbl">Weeks complete</div></div>
    <div class="prog-stat"><div class="prog-stat-val">${pct}%</div><div class="prog-stat-lbl">Overall progress</div></div>
  </div>
  <div class="prog-bar-wrap"><div class="prog-bar-fill" style="width:${pct}%"></div></div>
  <div class="prog-legend">
    <div class="prog-leg"><div class="prog-leg-dot" style="background:#1DB87A;border:0.5px solid #0F6E56"></div>Complete</div>
    <div class="prog-leg"><div class="prog-leg-dot" style="background:var(--bg3);border:2px solid #1DB87A"></div>Current week</div>
    <div class="prog-leg"><div class="prog-leg-dot" style="background:var(--bg3);border:0.5px solid var(--border)"></div>Upcoming</div>
  </div>`;

  PROG_PHASES.forEach(ph=>{
    const phDone=ph.weeks.filter(w=>wkChecked.includes(w)).length;
    html+=`<div class="prog-phase-block">
      <div class="prog-phase-head" style="color:${ph.color}">${ph.name}<span class="prog-phase-ct">${phDone}/${ph.weeks.length} wks</span></div>
      <div class="prog-week-grid">`;
    ph.weeks.forEach(wk=>{
      const isDone=wkChecked.includes(wk);
      const isCur=wk===curWk;
      html+=`<div class="prog-wk ${isDone?'done':''} ${isCur&&!isDone?'cur':''}" onclick="toggleWk(${wk})">
        <span class="prog-wk-chk">&#10003;</span>
        <span class="prog-wk-num">Wk ${wk}</span>
        <span class="prog-wk-date">${PROG_WEEK_STARTS[wk-1]}</span>
      </div>`;
    });
    html+=`</div></div>`;
  });

  html+=`<div class="prog-reset"><button class="prog-reset-btn" onclick="resetWks()">Reset all weeks</button></div>`;
  document.getElementById('progressContent').innerHTML=html;
}

// ----- INIT -----
renderProgressContent();
renderPhaseNav(); renderPhaseInfo(); renderScheduleDays(); renderScheduleContent();
renderLiftPhaseNav(); renderLiftDayTabs(); renderLiftContent();
renderExploDays(); renderExploContent();
renderCardioContent();
renderStretchDays(); renderStretchContent();
renderAnkleContent();
renderShoulderDays(); renderShoulderContent();
renderHipContent();
renderLandmineContent();
</script>
